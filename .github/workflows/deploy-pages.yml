name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --force

      - name: Build
        run: npm run build
        env:
          # Load compressed GLB/KTX assets in production
          VITE_COMPRESSED: "1"
          VITE_MUSIC: "1"
          VITE_LOG: "0"
          # Leave empty: optional multiplayer WebSocket server
          VITE_SERVER_URL: ""
          VITE_ANALYTICS_TAG: ""
          VITE_GAME_PUBLIC: ""

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
